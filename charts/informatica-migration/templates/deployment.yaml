# Auto-generated by Sprint 93 — Helm Deployment Template
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "informatica-migration.fullname" . }}
  labels:
    app: {{ include "informatica-migration.name" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "informatica-migration.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "informatica-migration.name" . }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: migration-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: INFORMATICA_MIGRATION_TARGET
              value: {{ .Values.migration.target | quote }}
          envFrom:
            - secretRef:
                name: {{ include "informatica-migration.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          volumeMounts:
            - name: config
              mountPath: /app/migration.yaml
              subPath: migration.yaml
            {{- if .Values.persistence.enabled }}
            - name: output
              mountPath: /app/output
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "informatica-migration.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: output
          persistentVolumeClaim:
            claimName: {{ include "informatica-migration.fullname" . }}-output
        {{- end }}
