# Default values for informatica-migration Helm chart
# Auto-generated by Sprint 93

replicaCount: 1

image:
  repository: informatica-migration
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "4Gi"
    cpu: "2000m"

migration:
  target: "fabric"
  config: |
    target: "fabric"
    lakehouse:
      bronze: "bronze"
      silver: "silver"
      gold: "gold"

secrets:
  fabricToken: ""
  fabricWorkspaceId: ""
  databricksHost: ""
