  datadogApiKey: ""

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
