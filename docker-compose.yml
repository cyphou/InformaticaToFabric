# Auto-generated by Sprint 93 — Docker Compose
# Services: migration tool, web UI, optional Redis job queue

services:
  migration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: informatica-migration-api
    ports:
      - "8000:8000"
    volumes:
      - ./input:/app/input:ro
      - ./output:/app/output
      - ./migration.yaml:/app/migration.yaml:ro
    environment:
      - INFORMATICA_MIGRATION_TARGET=${MIGRATION_TARGET:-fabric}
      - INFORMATICA_DATABRICKS_CATALOG=${DATABRICKS_CATALOG:-main}
      - DD_API_KEY=${DD_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: informatica-migration-web
    command: ["python", "web/app.py"]
    ports:
      - "8501:8501"
    volumes:
      - ./input:/app/input:ro
      - ./output:/app/output
      - ./migration.yaml:/app/migration.yaml:ro
      - ./web:/app/web:ro
    environment:
      - INFORMATICA_MIGRATION_TARGET=${MIGRATION_TARGET:-fabric}
    depends_on:
      migration:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: informatica-migration-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles:
      - queue

volumes:
  redis-data:
